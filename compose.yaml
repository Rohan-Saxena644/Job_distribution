services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: jobs
      POSTGRES_USER: jobs
      POSTGRES_PASSWORD: jobs
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobs -d jobs"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: jobs
      RABBITMQ_DEFAULT_PASS: jobs
    ports:
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 3s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

  worker:
    build: .
    environment:
      APP_MODE: worker
      DATABASE_URL: postgres://jobs:jobs@postgres:5432/jobs?sslmode=disable
      RABBITMQ_URL: amqp://jobs:jobs@rabbitmq:5672/
      JOB_QUEUE_NAME: jobs
      REDIS_URL: redis://redis:6379/0
      EVENT_CHANNEL: job.events
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build: .
    environment:
      APP_MODE: api
      GRPC_ADDRESS: :50051
      DATABASE_URL: postgres://jobs:jobs@postgres:5432/jobs?sslmode=disable
      RABBITMQ_URL: amqp://jobs:jobs@rabbitmq:5672/
      JOB_QUEUE_NAME: jobs
    ports:
      - "50051:50051"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051"]
      interval: 2s
      timeout: 3s
      retries: 15
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  producer:
    build: .
    profiles: ["tools"]
    environment:
      APP_MODE: producer
      DATABASE_URL: postgres://jobs:jobs@postgres:5432/jobs?sslmode=disable
      RABBITMQ_URL: amqp://jobs:jobs@rabbitmq:5672/
      JOB_QUEUE_NAME: jobs
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  grpc-client:
    build: .
    profiles: ["tools"]
    environment:
      APP_MODE: grpc-client
      GRPC_ADDRESS: api:50051
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:

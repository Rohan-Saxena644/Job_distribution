services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobs
      POSTGRES_USER: jobs
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobs -d jobs"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4-management-alpine
    hostname: rabbitmq
    restart: unless-stopped
    ports:
      - "127.0.0.1:15673:15672"
    secrets:
      - source: rabbitmq_config
        target: /etc/rabbitmq/conf.d/20-secrets.conf
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 3s
      timeout: 5s
      retries: 20
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

  worker:
    build: .
    restart: unless-stopped
    environment:
      APP_MODE: worker
      DATABASE_URL_FILE: /run/secrets/database_url
      RABBITMQ_URL_FILE: /run/secrets/rabbitmq_url
      JOB_QUEUE_NAME: jobs
      REDIS_URL: redis://redis:6379/0
      EVENT_CHANNEL: job.events
    secrets:
      - database_url
      - rabbitmq_url
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build: .
    restart: unless-stopped
    environment:
      APP_MODE: api
      GRPC_ADDRESS: :50051
      DATABASE_URL_FILE: /run/secrets/database_url
      RABBITMQ_URL_FILE: /run/secrets/rabbitmq_url
      JOB_QUEUE_NAME: jobs
      GRPC_TLS_CERT_FILE: /run/secrets/grpc_certificate
      GRPC_TLS_KEY_FILE: /run/secrets/grpc_private_key
      GRPC_AUTH_TOKEN_FILE: /run/secrets/grpc_auth_token
    ports:
      - "127.0.0.1:50051:50051"
    secrets:
      - database_url
      - rabbitmq_url
      - grpc_certificate
      - grpc_private_key
      - grpc_auth_token
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051"]
      interval: 2s
      timeout: 3s
      retries: 15
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  producer:
    build: .
    profiles: ["tools"]
    environment:
      APP_MODE: producer
      DATABASE_URL_FILE: /run/secrets/database_url
      RABBITMQ_URL_FILE: /run/secrets/rabbitmq_url
      JOB_QUEUE_NAME: jobs
    secrets:
      - database_url
      - rabbitmq_url
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  grpc-client:
    build: .
    profiles: ["tools"]
    environment:
      APP_MODE: grpc-client
      GRPC_ADDRESS: api:50051
      GRPC_TLS_CA_FILE: /run/secrets/grpc_certificate
      GRPC_TLS_SERVER_NAME: api
      GRPC_AUTH_TOKEN_FILE: /run/secrets/grpc_auth_token
    secrets:
      - grpc_certificate
      - grpc_auth_token
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:

secrets:
  postgres_password:
    file: ./secrets/postgres-password.txt
  database_url:
    file: ./secrets/database-url.txt
  rabbitmq_config:
    file: ./secrets/rabbitmq.conf
  rabbitmq_url:
    file: ./secrets/rabbitmq-url.txt
  grpc_certificate:
    file: ./secrets/grpc-server.crt
  grpc_private_key:
    file: ./secrets/grpc-server.key
  grpc_auth_token:
    file: ./secrets/grpc-token.txt
